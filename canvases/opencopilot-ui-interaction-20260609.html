<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenCopilot UI 交互设计稿</title>
  <style>
    :root {
      --bg: #08101d;
      --bg-elevated: #0f172a;
      --panel: #151f36;
      --panel-soft: #1a2744;
      --border: rgba(148, 163, 184, 0.22);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent: #4f8cff;
      --accent-soft: rgba(79, 140, 255, 0.16);
      --success: #34d399;
      --warning: #f59e0b;
      --shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
      --radius-lg: 24px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --max-width: 1480px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Inter, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(79, 140, 255, 0.16), transparent 28%),
        radial-gradient(circle at top right, rgba(52, 211, 153, 0.12), transparent 24%),
        linear-gradient(180deg, #08101d 0%, #0b1220 100%);
      color: var(--text-primary);
    }

    a {
      color: inherit;
    }

    .page {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 28px 24px 60px;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    .hero-card,
    .meta-card,
    .artboard,
    .connector-card {
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .hero-card {
      padding: 28px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: #dbeafe;
      font-size: 13px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 36px;
      line-height: 1.15;
    }

    .hero-desc {
      margin: 0;
      color: var(--text-secondary);
      font-size: 16px;
      line-height: 1.7;
    }

    .hero-points {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .hero-pill {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.08);
      border: 1px solid rgba(148, 163, 184, 0.12);
      color: var(--text-primary);
      font-size: 13px;
    }

    .meta-card {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .meta-row {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 12px;
      align-items: start;
      font-size: 14px;
      line-height: 1.7;
    }

    .meta-label {
      color: var(--text-secondary);
    }

    .meta-value {
      color: var(--text-primary);
    }

    .meta-list {
      margin: 0;
      padding-left: 18px;
      color: var(--text-secondary);
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 20;
      margin-bottom: 24px;
      padding: 12px;
      border-radius: 18px;
      background: rgba(8, 16, 29, 0.8);
      border: 1px solid rgba(148, 163, 184, 0.16);
      backdrop-filter: blur(14px);
    }

    .toolbar-inner {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .toolbar a {
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 12px;
      background: rgba(148, 163, 184, 0.08);
      border: 1px solid rgba(148, 163, 184, 0.14);
      color: var(--text-primary);
      font-size: 14px;
    }

    .toolbar a:hover {
      background: var(--accent-soft);
      border-color: rgba(79, 140, 255, 0.42);
    }

    .section-title {
      margin: 30px 0 16px;
      font-size: 22px;
    }

    .artboards {
      display: grid;
      gap: 22px;
    }

    .artboard {
      padding: 22px;
      overflow: hidden;
    }

    .artboard-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 18px;
    }

    .artboard-title {
      margin: 0 0 6px;
      font-size: 26px;
    }

    .artboard-subtitle {
      margin: 0;
      color: var(--text-secondary);
      font-size: 15px;
      line-height: 1.7;
    }

    .window-badge {
      white-space: nowrap;
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(52, 211, 153, 0.12);
      border: 1px solid rgba(52, 211, 153, 0.24);
      color: #d1fae5;
      font-size: 13px;
    }

    .artboard-grid {
      display: grid;
      grid-template-columns: minmax(320px, 0.9fr) minmax(320px, 1.1fr);
      gap: 20px;
    }

    .stack {
      display: grid;
      gap: 16px;
    }

    .info-card,
    .panel-card,
    .wireframe-card,
    .flow-card,
    .metric-card {
      background: rgba(21, 31, 54, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.14);
      border-radius: var(--radius-md);
      padding: 16px;
    }

    .card-title {
      margin: 0 0 10px;
      font-size: 15px;
      color: #dbeafe;
    }

    .body-text {
      margin: 0;
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.75;
    }

    .chip-list,
    .bullet-list,
    .metric-list,
    .flow-list {
      margin: 0;
      padding-left: 18px;
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.7;
    }

    .chip-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(79, 140, 255, 0.12);
      border: 1px solid rgba(79, 140, 255, 0.22);
      color: #dbeafe;
      font-size: 13px;
    }

    .panel-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .panel-card h4 {
      margin: 0 0 6px;
      font-size: 15px;
    }

    .panel-role {
      margin: 0 0 8px;
      color: #cbd5e1;
      font-size: 13px;
      line-height: 1.6;
    }

    .wireframe-card pre {
      margin: 0;
      overflow-x: auto;
      padding: 16px;
      border-radius: 14px;
      background: #0a1020;
      border: 1px solid rgba(148, 163, 184, 0.12);
      color: #dbeafe;
      font-size: 12px;
      line-height: 1.45;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    .flow-metric-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .connectors {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .connector-card {
      padding: 18px;
    }

    .connector-route {
      font-size: 16px;
      margin: 0 0 10px;
      color: #e2e8f0;
    }

    .connector-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(245, 158, 11, 0.12);
      border: 1px solid rgba(245, 158, 11, 0.2);
      color: #fcd34d;
      font-size: 12px;
      margin-bottom: 12px;
    }

    .footer-note {
      margin-top: 22px;
      color: var(--text-secondary);
      font-size: 13px;
      line-height: 1.7;
      text-align: center;
    }

    @media (max-width: 1100px) {
      .hero,
      .artboard-grid,
      .flow-metric-grid,
      .connectors {
        grid-template-columns: 1fr;
      }

      .panel-grid {
        grid-template-columns: 1fr;
      }

      .artboard-header {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <div class="hero-card">
        <div class="eyebrow">OpenCopilot · UI Interaction Preview</div>
        <h1>OpenCopilot 三核心窗口可视化设计稿</h1>
        <p class="hero-desc">
          这是一份可直接在浏览器中查看的交互设计预览页，基于当前项目的真实结构整理，
          聚焦 `Smart Copilot`、`Workspace`、`Studio` 三个核心窗口，以及它们之间的接力关系。
        </p>
        <div class="hero-points">
          <span class="hero-pill">右键瞬时入口</span>
          <span class="hero-pill">复杂任务工作台</span>
          <span class="hero-pill">PPT 专业共创</span>
          <span class="hero-pill">跨窗口上下文接力</span>
        </div>
      </div>
      <div class="meta-card" id="meta-card"></div>
    </section>

    <nav class="toolbar">
      <div class="toolbar-inner" id="artboard-nav"></div>
    </nav>

    <h2 class="section-title">核心画板</h2>
    <section class="artboards" id="artboards"></section>

    <h2 class="section-title">跨窗口链路</h2>
    <section class="connectors" id="connectors"></section>

    <p class="footer-note">
      该页面为静态设计稿预览，不依赖构建工具。若你要继续升级，我可以再把它做成更高保真的可交互原型。
    </p>
  </div>

  <script>
    const canvasDocument = {
